<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sinkron Real-time</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
            min-height: 50px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Input Data Bersama</h2>
    <input type="text" id="inputData" placeholder="Ketik sesuatu di sini...">
    <button id="btnSimpan">Kirim ke Semua Perangkat</button>

    <div id="output-box">
        <span id="textTampil">Memuat data...</span>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        // Import modul Firebase yang dibutuhkan
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue } from "https://gstatic.com";

        // 1. GANTI DENGAN KODE FIREBASE CONFIG ANDA SENDIRI DARI LANGKAH 1
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "proyek-anda",
            storageBucket: "://appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // 2. Inisialisasi Firebase dan Database
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Buat referensi lokasi penyimpanan di database (kita beri nama "pesanUtama")
        const dbRef = ref(database, 'pesanUtama');

        // 3. FUNGSI UNTUK MENGIRIM DATA (Saat tombol diklik)
        document.getElementById('btnSimpan').addEventListener('click', () => {
            const teksInput = document.getElementById('inputData').value;
            if (teksInput.trim() !== "") {
                // Simpan data ke Firebase
                set(dbRef, teksInput)
                    .then(() => {
                        document.getElementById('inputData').value = ""; // Kosongkan input setelah kirim
                    })
                    .catch((error) => console.error("Gagal menyimpan:", error));
            }
        });

        // 4. FUNGSI SINKRONISASI REAL-TIME (Mendengarkan perubahan dari perangkat lain)
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Tampilan otomatis berubah di SEMUA perangkat tanpa perlu refresh page
                document.getElementById('textTampil').innerText = data;
            } else {
                document.getElementById('textTampil').innerText = "Belum ada data.";
            }
        });
    </script>
</body>
</html>
