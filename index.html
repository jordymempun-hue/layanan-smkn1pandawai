<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login Firebase</title>
    <style>
        /* Desain tampilan sederhana agar form berada di tengah layar */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #pesan-error { color: red; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Masuk Aplikasi</h2>
    
    <!-- Formulir Login -->
    <form id="form-login">
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="contoh@email.com" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Minimal 6 karakter" required>
        </div>
        <button type="submit">Login</button>
    </form>

    <!-- Tempat menampilkan pesan error jika gagal login -->
    <div id="pesan-error"></div>
</div>

<!-- SCRIPT FIREBASE -->
<script type="module">
    // 1. Mengimpor library Firebase Core dan Authentication
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

    // 2. GANTI DENGAN KODE KONFIGURASI PROYEK FIREBASE ANDA SENDIRI
    const firebaseConfig = {
        apiKey: "AIzaSyAnda...",
        authDomain: "://firebaseapp.com",
        projectId: "proyek-anda",
        storageBucket: "://appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456:web:abc123xyz"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 3. Logika Penanganan Form Login
    const formLogin = document.getElementById("form-login");
    const pesanError = document.getElementById("pesan-error");

    formLogin.addEventListener("submit", (e) => {
        // Menahan agar browser tidak otomatis refresh halaman saat tombol diklik
        e.preventDefault(); 

        // Mengambil data teks yang diketik user
        const txtEmail = document.getElementById("email").value;
        const txtPassword = document.getElementById("password").value;

        pesanError.innerText = "Memproses...";

        // Proses verifikasi ke Firebase Authentication
        signInWithEmailAndPassword(auth, txtEmail, txtPassword)
            .then((userCredential) => {
                // JIKA BERHASIL: Pindah ke halaman kedua
                pesanError.innerText = "";
                alert("Login Berhasil!");
                window.location.href = "halaman4.html"; 
            })
            .catch((error) => {
                // JIKA GAGAL: Tampilkan pesan error di bawah form tanpa refresh halaman
                console.error("Error dari Firebase:", error.code);
                
                if (error.code === 'auth/invalid-credential') {
                    pesanError.innerText = "Email atau Password salah!";
                } else if (error.code === 'auth/invalid-email') {
                    pesanError.innerText = "Format email tidak valid!";
                } else {
                    pesanError.innerText = "Gagal masuk: " + error.message;
                }
            });
    });
</script>

</body>
</html>
