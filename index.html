<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login Firebase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #pesan-error { color: red; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Masuk Aplikasi</h2>
    
    <form id="form-login">
        <div class="input-group">
            <label for="email">Email</label>
            <!-- Email Anda sudah otomatis terpasang sebagai nilai bawaan -->
            <input type="email" id="email" value="Jordymempun@gmail.com" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <!-- Kata sandi Anda sudah otomatis terpasang sebagai nilai bawaan -->
            <input type="password" id="password" value="@Jfm010105" required>
        </div>
        <button type="submit">Login</button>
    </form>

    <div id="pesan-error"></div>
</div>

<!-- SCRIPT FIREBASE -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

    // PENTING: Ganti isi kode di bawah ini dengan milik Firebase Console Anda sendiri
    const firebaseConfig = {
  apiKey: "AIzaSyCSdKzabXgWTMjuGyDzRKfSgBzSqgJLPjw",
  authDomain: "smkn1pdw-87d17.firebaseapp.com",
  databaseURL: "https://smkn1pdw-87d17-default-rtdb.firebaseio.com",
  projectId: "smkn1pdw-87d17",
  storageBucket: "smkn1pdw-87d17.firebasestorage.app",
  messagingSenderId: "42700023540",
  appId: "1:42700023540:web:86d3712e318a0da07820a1"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const formLogin = document.getElementById("form-login");
    const pesanError = document.getElementById("pesan-error");

    formLogin.addEventListener("submit", (e) => {
        e.preventDefault(); // Menahan refresh halaman otomatis

        // Mengambil data dari kolom input (otomatis membaca data Anda)
        const txtEmail = document.getElementById("email").value;
        const txtPassword = document.getElementById("password").value;

        pesanError.style.color = "blue";
        pesanError.innerText = "Memproses verifikasi...";

        // Proses Login ke Firebase
        signInWithEmailAndPassword(auth, txtEmail, txtPassword)
            .then((userCredential) => {
                pesanError.innerText = "";
                alert("Login Berhasil! Selamat Datang.");
                window.location.href = "halaman4.html"; // Pindah halaman setelah sukses
            })
            .catch((error) => {
                console.error("Error dari Firebase:", error.code);
                pesanError.style.color = "red";
                
                if (error.code === 'auth/invalid-credential') {
                    pesanError.innerText = "Email atau Password salah! Periksa apakah akun sudah didaftarkan di Firebase Console.";
                } else if (error.code === 'auth/user-not-found') {
                    pesanError.innerText = "Akun belum terdaftar di Firebase Console.";
                } else {
                    pesanError.innerText = "Gagal masuk: " + error.message;
                }
            });
    });
</script>

</body>
</html>
