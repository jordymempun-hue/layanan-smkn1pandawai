<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba Realtime Firebase</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        #output-box {
            margin-top: 20px;
            padding: 20px;
            background: #eef2f3;
            border: 2px dashed #95a5a6;
            border-radius: 8px;
        }

        #textTampil {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
        }

        #statusKoneksi {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h2>Uji Sinkronisasi Data</h2>
    <input type="text" id="inputData" placeholder="Ketik teks di sini...">
    <button id="btnSimpan">Kirim ke Semua Perangkat</button>

    <div id="output-box">
        <div id="textTampil">Menghubungkan ke Firebase...</div>
        <div id="statusKoneksi">Memeriksa jaringan...</div>
    </div>

       <!-- GANTI SELURUH SCRIPT FIREBASE ANDA DENGAN KODE DI BAWAH INI -->
    <script type="module">
        // Menggunakan bundle utuh agar browser tidak perlu mengunduh file terpisah-pisah
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue } from "https://gstatic.com";

        // CONFIG ASLI MILIK ANDA
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com", // PASTIKAN URL INI SUDAH DIGANTI DENGAN MILIK ANDA
            projectId: "proyek-anda",
            storageBucket: "://appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Fungsi pembungkus utama untuk mendeteksi error koneksi secara paksa
        function mulaiFirebase() {
            try {
                // Pastikan databaseURL tidak menggunakan bawaan contoh
                if (firebaseConfig.databaseURL.includes("proyek-anda")) {
                    throw new Error("Anda belum mengganti databaseURL dengan URL Firebase asli Anda!");
                }

                const app = initializeApp(firebaseConfig);
                const database = getDatabase(app);
                const dbRef = ref(database, 'pesanUtama');

                document.getElementById('statusKoneksi').innerText = "Terhubung! Menunggu perubahan data...";

                // 1. Tombol Kirim Data
                document.getElementById('btnSimpan').onclick = function() {
                    const teksInput = document.getElementById('inputData').value;
                    if(teksInput.trim() !== "") {
                        document.getElementById('statusKoneksi').innerText = "Mengirim data ke awan...";
                        set(dbRef, teksInput)
                            .then(() => {
                                document.getElementById('inputData').value = "";
                                document.getElementById('statusKoneksi').innerText = "Data berhasil dikirim!";
                            })
                            .catch((err) => {
                                document.getElementById('statusKoneksi').innerText = "Gagal kirim: " + err.message;
                            });
                    }
                };

                // 2. Sinkronisasi Otomatis Perangkat Lain
                onValue(dbRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('textTampil').innerText = data;
                        document.getElementById('statusKoneksi').innerText = "Data diperbarui secara realtime!";
                    } else {
                        document.getElementById('textTampil').innerText = "(Database Kosong)";
                    }
                }, (error) => {
                    document.getElementById('statusKoneksi').innerText = "Firebase memblokir: " + error.message;
                });

            } catch (error) {
                document.getElementById('textTampil').innerText = "Koneksi Gagal!";
                document.getElementById('statusKoneksi').innerText = error.message;
                console.error(error);
            }
        }

        // Jalankan fungsi setelah halaman selesai dimuat sempurna
        window.onload = mulaiFirebase;
    </script>
</body>
</html>
